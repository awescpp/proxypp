name: Deploy Docs

on:
  push:
    branches:
      - master

    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-docs:
    runs-on: ubuntu-22.04

    env:
      SSH_HOST: ${{secrets.TENCENT_HOST}}
      SSH_PORT: ${{secrets.TENCENT_PORT}}
      SSH_USER: ${{secrets.TENCENT_USER}}
      SSH_KEY: ${{secrets.TENCENT_SSH_KEY}}
      DEPLOY_PATH: ${{secrets.TENCENT_DEPLOY_PATH}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install docs dependencies
        working-directory: docs
        run: |
          pnpm install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: pnpm build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy docs to Tencent Cloud
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" "mkdir -p \"$DEPLOY_PATH\""
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519 -p ${SSH_PORT:-22}" docs/dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"