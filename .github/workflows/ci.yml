name: CI

on:
  push:
    branches:
      - "master"
    paths:
      - app/**
      - src/**
      - tests/**
      - e2e/**
      - schemas/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json
      - vcpkg-configuration.json
      - ".github/workflows/ci.yml"

  pull_request:
    branches:
      - "master"
    paths:
      - app/**
      - src/**
      - tests/**
      - e2e/**
      - schemas/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json
      - vcpkg-configuration.json
      - ".github/workflows/ci.yml"

  workflow_dispatch:

permissions:
  contents: read


jobs:
  windows-clang-cl:
    name: Windows / MSVC / Ninja
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    env:
      DEBUG_OUT_DIR: "out/build/windows-msvc-debug-ci"
      RELEASE_OUT_DIR: "out/build/windows-msvc-release-ci"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup MSVC and Windows SDK environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: 'x64'

      - name: Verify MSVC and Ninja toolchain
        run: |
          $ErrorActionPreference = "Stop"

          Get-Command cl.exe -ErrorAction Stop
          Get-Command link.exe -ErrorAction Stop
          Get-Command rc.exe -ErrorAction Stop
          Get-Command mt.exe -ErrorAction Stop
          Get-Command cmake.exe -ErrorAction Stop
          Get-Command ninja.exe -ErrorAction Stop
          
          cmake --version
          ninja --version

      - name: Restore vcpkg binary cache
        uses: actions/cache@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-${{ runner.os }}-msvc-x64-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-msvc-x64-

      - name: Configure Debug and Release
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          cmake --preset windows-msvc-debug-ci
          cmake --preset windows-msvc-release-ci

      - name: Build Debug
        run: |
          cmake --build --preset windows-msvc-debug-ci --parallel

      - name: Test Debug
        run: |
          ctest --preset windows-msvc-debug-ci

      - name: Build Release
        run: |
          cmake --build --preset windows-msvc-release-ci --parallel

      - name: Test Release
        run: |
          ctest --preset windows-msvc-release-ci

      # region: E2E Test

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable

      - name: Install Node dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Resolve Release proxy++ binary
        run: |
          $ErrorActionPreference = "Stop"

          $exe = (
            Resolve-Path "$env:RELEASE_OUT_DIR/proxy++.exe"
          ).Path
          
          Write-Host "Using Release proxy++ binary: $exe"
          
          "PROXYPP_BIN=$exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append


      - name: Run E2E tests with Release proxy++.exe
        run: |
          Write-Host "PROXYPP_BIN=$env:PROXYPP_BIN"
          
          if (-not (Test-Path $env:PROXYPP_BIN)) {
            throw "PROXYPP_BIN does not exist: $env:PROXYPP_BIN"
          }

          pnpm test:e2e

      # endregion

      - name: Collect Debug artifacts
        run: |
          $ErrorActionPreference = "Stop"
          
          $artifactDir = "artifacts\proxypp-windows-x64-debug"
          $exe = Join-Path $env:DEBUG_OUT_DIR "proxy++.exe"
          
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          Copy-Item $exe $artifactDir
          Copy-Item "examples/rules/rules02.json" -Destination $artifactDir/rules.json
          
          Get-ChildItem -Path $env:DEBUG_OUT_DIR -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName $artifactDir
          }


      - name: Collect Release artifact
        run: |
          $ErrorActionPreference = "Stop"

          $artifactDir = "artifacts\proxypp-windows-x64-release"
          $exe = Join-Path $env:RELEASE_OUT_DIR "proxy++.exe"

          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          Copy-Item $exe $artifactDir
          Copy-Item "examples/rules/rules02.json" -Destination $artifactDir/rules.json

          Get-ChildItem -Path $env:RELEASE_OUT_DIR -Filter "*.dll" | ForEach-Object {
          Copy-Item $_.FullName $artifactDir
          }


      - name: Upload Debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: proxypp-windows-x64-debug
          path: artifacts/proxypp-windows-x64-debug
          if-no-files-found: error

      - name: Upload Release artifact
        uses: actions/upload-artifact@v7
        with:
          name: proxypp-windows-x64-release
          path: artifacts/proxypp-windows-x64-release
          if-no-files-found: error

