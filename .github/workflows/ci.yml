name: CI

on:
  push:
    branches:
      - "dev/fix-ci"
    paths:
      - app/**
      - src/**
      - tests/**
      - e2e/**
      - schemas/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json
      - vcpkg-configuration.json
      - ".github/workflows/ci.yml"

  pull_request:
    branches:
      - "dev/fix-ci"
    paths:
      - app/**
      - src/**
      - tests/**
      - e2e/**
      - schemas/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json
      - vcpkg-configuration.json
      - ".github/workflows/ci.yml"

  workflow_dispatch:

permissions:
  contents: read
  attestations: read

jobs:
  windows-clang-cl:
    name: Windows / LLVM 22.1.8 / Ninja
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    env:
      LLVM_VERSION: "22.1.8"
      DEBUG_OUT_DIR: "cmake-build-debug"
      RELEASE_OUT_DIR: "cmake-build-release"
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup MSVC and Windows SDK environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: 'x64'

      - name: Install LLVM
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          
          $llvmRoot = "C:\LLVM\$env:LLVM_VERSION"
          $installer = Join-Path $env:RUNNER_TEMP "LLVM-$env:LLVM_VERSION-win64.exe"
          
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-win64.exe"
          curl.exe -sS --fail --location --retry 3 --output $installer $url
          
          gh attestation verify $installer --repo llvm/llvm-project
          
          $process = Start-Process -FilePath $installer -ArgumentList @("/S", "/D=$llvmRoot") -Wait -PassThru
          if($process.ExitCode -ne 0) {
            throw "LLVM installer failed with exit code $($process.ExitCode)."
          }
          
          "LLVM_ROOT=$llvmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$llvmRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append


      - name: Verify LLVM and Ninja toolchain
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          
          $expectedClang = Join-Path $env:LLVM_ROOT "bin\clang-cl.exe"
          $actualClang = (Get-Command clang-cl).Source
          
          if(
            [System.IO.Path]::GetFullPath($actualClang) -ne
            [System.IO.Path]::GetFullPath($expectedClang)
          )
            {
              throw "Unexpected clang-cl: $actualClang"
            }
          
          clang-cl --version
          lld-link --version
          llvm-profdata --version
          llvm-cov --version
          ninja --version
          
          Get-Command llvm-rc -ErrorAction Stop
          Get-Command llvm-mt -ErrorAction Stop
          
          $versionOutput = clang-cl --version | Select-Object -First 1
          
          if(-not $versionOutput.Contains($env:LLVM_VERSION)) 
          {
            throw "Expected LLVM $env:LLVM_VERSION, got: $versionOutput"
          }

      - name: Restore vcpkg binary cache
        uses: actions/cache@v6
        with:
          path: .vcpkg-bincache
          key: vcpkg-${{ runner.os }}-clang-cl-x64-llvm-${{ env.LLVM_VERSION }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-clang-cl-x64-llvm-${{ env.LLVM_VERSION }}-

      - name: Configure Debug and Release
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          
          $commandArgs = @("-S", ".", "-G", "Ninja"
            "-DCMAKE_CXX_COMPILER=$env:LLVM_ROOT\bin\clang-cl.exe"
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
            "-DVCPKG_TARGET_TRIPLET=x64-windows"
            "-DVCPKG_USE_LEGACY_APPLOCAL=ON"
          )
          $debugArgs = $commandArgs + @("-B", "$env:DEBUG_OUT_DIR", "-DCMAKE_BUILD_TYPE=Debug")
          $releaseArgs = $commandArgs + @("-B", "$env:RELEASE_OUT_DIR", "-DCMAKE_BUILD_TYPE=Release")
          cmake @debugArgs
          cmake @releaseArgs

      - name: Build Debug
        run: |
          cmake --build $env:DEBUG_OUT_DIR --parallel

      - name: Test Debug
        run: |
          ctest --test-dir $env:DEBUG_OUT_DIR --output-on-failure

      - name: Build Release
        run: |
          cmake --build $env:RELEASE_OUT_DIR --parallel

      - name: Test Release
        run: |
          ctest --test-dir $env:RELEASE_OUT_DIR --output-on-failure

      # region: E2E Test

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable

      - name: Install Node dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Resolve Release proxy++ binary
        run: |
          $ErrorActionPreference = "Stop"

          $exe = (
            Resolve-Path "$env:RELEASE_OUT_DIR/proxy++.exe"
          ).Path
          
          Write-Host "Using Release proxy++ binary: $exe"
          
          "PROXYPP_BIN=$exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append


      - name: Run E2E tests with Release proxy++.exe
        run: |
          Write-Host "PROXYPP_BIN=$env:PROXYPP_BIN"
          
          if (-not (Test-Path $env:PROXYPP_BIN)) {
            throw "PROXYPP_BIN does not exist: $env:PROXYPP_BIN"
          }

          pnpm test:e2e

      # endregion

      - name: Collect Debug artifacts
        run: |
          $ErrorActionPreference = "Stop"
          
          $artifactDir = "artifacts\proxypp-windows-x64-debug"
          $exe = Join-Path $env:DEBUG_OUT_DIR "proxy++.exe"
          
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          Copy-Item $exe $artifactDir
          
          Get-ChildItem -Path $env:DEBUG_OUT_DIR -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName $artifactDir
          }


      - name: Collect Release artifact
        run: |
          $ErrorActionPreference = "Stop"

          $artifactDir = "artifacts\proxypp-windows-x64-release"
          $exe = Join-Path $env:RELEASE_OUT_DIR "proxy++.exe"

          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          Copy-Item $exe $artifactDir

          Get-ChildItem -Path $env:RELEASE_OUT_DIR -Filter "*.dll" | ForEach-Object {
          Copy-Item $_.FullName $artifactDir
          }


      - name: Upload Debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: proxypp-windows-x64-debug
          path: artifacts/proxypp-windows-x64-debug
          if-no-files-found: error

      - name: Upload Release artifact
        uses: actions/upload-artifact@v7
        with:
          name: proxypp-windows-x64-release
          path: artifacts/proxypp-windows-x64-release
          if-no-files-found: error

